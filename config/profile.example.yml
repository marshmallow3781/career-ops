# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  twitter: "https://x.com/janesmith"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Senior AI Engineer"
    - "Staff ML Engineer"

  # (autopilot) Multi-facet candidates: list every archetype you're open to.
  # Note: AI / AI-Native / LLM Engineer roles are typically fullstack + LLM
  # combinations — they get classified as "fullstack" and scored on the
  # combination of candidate's fullstack (frontend + backend) and LLM work.
  # No separate ai_engineer archetype needed.
  archetypes_of_interest:
    - frontend
    - backend
    - infra
    - machine_learning
    - fullstack

  seniority_min: "Mid-Senior"
  seniority_max: "Staff"
  # Hard-filter strings (applied in Stage 1, free).
  # Note: candidate is OK with junior/entry/intern roles if the stack matches;
  # Haiku scores them on stack fit without downranking for seniority.
  deal_breakers:
    - "Test"
    - "Contract"
    - "C2C"

  # Companies to exclude from the digest entirely. Case-insensitive substring
  # match against the normalized company slug. Applied in digest-builder
  # Stage 1 alongside title filter — zero LLM cost.
  company_blacklist:
    - "RemoteHunter"
    - "Walmart"
    - "PayPal"
    - "Jobright.ai"
    - "Turing"
    - "ByteDance"
    - "TikTok"
    - "Insight Global"
    - "CyberCoders"
    - "Jobs via Dice"
    - "Open Talent"

  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "AI/ML Engineer"
      level: "Senior/Staff"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "AI Product Manager"
      level: "Senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "ML Engineer turned AI product builder"
  # Your exit story — what makes you unique
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  # Your top 3-5 superpowers
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "$150K-200K"     # Your target total comp
  currency: "USD"
  minimum: "$120K"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

# ── Experience-Source Assembly (this fork) ──────────────────────────

experience_sources:
  root: experience_source
  archetypes:
    frontend: frontend.md
    backend: backend.md
    infra: infra.md
    machine_learning: machine_learning.md
  jd_archetype_sources:
    frontend:         [frontend]
    backend:          [backend]
    infra:            [infra]
    machine_learning: [machine_learning]
    fullstack:        [frontend, backend]
  overrides:
    # Example: force a current employer to never appear as stub
    # acme:
    #   tier_floor: full
    #   stub: "Shipped production systems on a high-traffic AI platform."

archetype_defaults:
  frontend:         { top_bullets_full: 4, top_projects: 3 }
  backend:          { top_bullets_full: 5, top_projects: 4 }
  infra:            { top_bullets_full: 4, top_projects: 3 }
  machine_learning: { top_bullets_full: 5, top_projects: 4 }
  ml_platform:      { top_bullets_full: 5, top_projects: 4 }
  applied_ai:       { top_bullets_full: 4, top_projects: 3 }
  fullstack:        { top_bullets_full: 5, top_projects: 4 }

tier_rules:
  light_bullets: 2

prefer_latex: false

# Picker mode (assemble-cv --mode=picker)
# Maps JD archetype → one of the PDF resumes under resumes_dir.
# Unmapped archetypes (e.g. 'unknown') produce a placeholder cv.tailored.md.
cv:
  picker:
    resumes_dir: resumes
    archetype_map:
      backend: backend_ai_2.0.pdf
      infra: infra_2.0.pdf
      fullstack: fullstack_ai_2.0.pdf
      frontend: fullstack_ai_2.0.pdf          # reuses fullstack for now
      machine_learning: applied_ai_2.0.pdf    # file not yet present
      applied_ai: applied_ai_2.0.pdf          # file not yet present
  auto_prep:
    min_score: 8

# Auto-apply agent (apply-bot.mjs).
# Ships dry-run by default; pass --submit to unlock real submissions.
# OVERRIDE of CLAUDE.md "never auto-submit" rule — deliberate choice.
application_form_defaults:
  personal:
    full_name: "Your Name"
    preferred_name: ""
    email: "you@example.com"
    phone: "+1-555-0100"
    address: ""
    city: "San Francisco"
    province_state: "CA"
    country: "United States"
    postal_code: ""
    linkedin_url: ""
    github_url: ""
    portfolio_url: ""
    website_url: ""
  work_authorization:
    legally_authorized_to_work: "Yes"
    require_sponsorship: "No"
    work_permit_type: ""
  availability:
    earliest_start_date: "Immediately"
    available_for_full_time: "Yes"
    available_for_contract: "No"
  compensation:
    salary_expectation: "200000"
    salary_currency: "USD"
    salary_range_min: "180000"
    salary_range_max: "240000"
  experience:
    years_of_experience_total: "5"
    education_level: "Bachelor's Degree"
    current_job_title: ""
    current_company: ""
    target_role: "Senior Backend Engineer"
  eeo_voluntary:
    gender: "Decline to self-identify"
    race_ethnicity: "Decline to self-identify"
    veteran_status: "I am not a protected veteran"
    disability_status: "I do not wish to answer"
  auto_apply:
    enabled: true
    min_score: 9
    workers: 2
    capsolver_enabled: true
    capsolver_budget_usd: 5.0
    max_steps_per_job: 25
