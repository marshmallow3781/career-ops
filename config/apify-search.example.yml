# Apify LinkedIn scraper configuration
# Copy this file to config/apify-search.yml and adjust as needed.
# The non-example file is gitignored.

actor_id: BHzefUZlZRKWxkTck  # curious_coder/linkedin-jobs-scraper
api_token_env: APIFY_API_TOKEN

default_params:
  title: "Software Engineer"
  # workType is a REQUIRED string (actor rejects null). Enum: "1" = Full-time,
  # "2" / "3" are Part-time / Contract / Internship (actor returns the enum
  # in its error message if you pass an invalid value).
  workType: "1"
  # contractType and experienceLevel are left unset entirely. The actor treats
  # missing fields as "all" but rejects explicit nulls.
  proxy:
    useApifyProxy: true
    apifyProxyGroups: ["RESIDENTIAL"]

locations:
  # LinkedIn has no single state-level geoId; use metro-level geoIds and
  # fan out. geoId 102095887 was previously labeled "California" but
  # empirically resolves to LA County — use metro geoIds instead.
  - name: bay-area
    location: "San Francisco Bay Area"
    geoId: "90000084"
    baseline_rows: 500
    hourly_rows: 200
  - name: greater-la
    location: "Greater Los Angeles Area"
    geoId: "102095887"        # "California" per LinkedIn typeahead = LA County/Area
    baseline_rows: 300
    hourly_rows: 100
  - name: seattle
    location: "Greater Seattle Area"
    geoId: "90000091"
    baseline_rows: 300
    hourly_rows: 100
  - name: new-york
    location: "New York City Metropolitan Area"
    geoId: "90000070"
    baseline_rows: 300
    hourly_rows: 100
  - name: boston
    location: "Boston, Massachusetts, United States"
    geoId: "102380872"
    baseline_rows: 300
    hourly_rows: 100

baseline:
  schedule_pst: "07:00"
  params:
    publishedAt: r86400       # past 24h

hourly:
  # Every 2 hours, 7am-9pm PST → 8 runs/day.
  # publishedAt MUST be one of: "", r86400 (24h), r604800 (7d), r2592000 (30d).
  # The actor's schema rejects shorter windows — use r86400 here and rely on
  # dedup via seen-jobs.tsv to skip previously-fetched postings.
  schedule_pst: ["07:00", "09:00", "11:00", "13:00", "15:00", "17:00", "19:00", "21:00"]
  params:
    publishedAt: r86400
